# Gate-1 dstack-deployable compose — T1 attested tier (docs/deployment-tiers.md).
#
# IDENTICAL trust posture to ./docker-compose.yml (the local/dev variant), with ONE
# difference required by `phala deploy`: dstack cannot build from source, so the gateway
# is referenced as a PULLABLE image (${GATEWAY_IMAGE}) instead of `build:`. Everything
# else — Postgres + Ollama-embeddings + Letta + gateway ALL in-CVM, `logging: none` on the
# data-touching services, only the gateway exposes a port (dstack-gateway terminates TLS
# in-CVM and the cert carries the TDX quote) — is the same. One CVM per tenant.
#
# The compose_hash of THIS file is what gets measured into the attestation (rtmr3/app_id)
# and pinned in docs/security/measurements.md. Changing it changes the measurement — so
# the no-logging / no-egress posture here IS the enforced, attested no-plaintext control
# (plaintext-exposure map rows 1-3,5). Audit before pinning.
services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data          # dstack-encrypted disk (attestation-released key)
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    logging:
      driver: "none"   # no logging of memory contents at rest

  embeddings:
    image: ollama/ollama:latest
    restart: unless-stopped
    # Embeddings are computed from plaintext and are invertible -> MUST run in-CVM, never
    # on a trusted host (plaintext-exposure map row 3).
    volumes:
      - ollama:/root/.ollama
    logging:
      driver: "none"

  letta:
    image: letta/letta:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      embeddings:
        condition: service_started
    environment:
      LETTA_PG_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      OLLAMA_BASE_URL: http://embeddings:11434          # in-CVM embeddings
      OPENAI_API_BASE: ${ATTESTED_INFERENCE_BASE}       # attested provider (Redpill/Phala/Tinfoil)
      OPENAI_API_KEY: ${ATTESTED_INFERENCE_KEY}
      SECURE: "true"
      LETTA_SERVER_PASSWORD: ${LETTA_SERVER_PASSWORD}
    logging:
      driver: "none"

  gateway:
    image: ${GATEWAY_IMAGE}        # pullable (e.g. ghcr.io/<owner>/caladon-gateway:gate1) — see gate1.sh
    restart: unless-stopped
    depends_on:
      - letta
    environment:
      GATEWAY_RUN_MODE: cvm
      GATEWAY_LETTA_BASE_URL: http://letta:8283
      GATEWAY_LETTA_PASSWORD: ${LETTA_SERVER_PASSWORD}
      GATEWAY_ACCOUNTS_STORE: /data/accounts.json
      # The dstack guest agent (dstack 0.5.x) is a UNIX socket inside the CVM, not a host TCP
      # port: the gateway POSTs {report_data: SHA-256(eph_pub)} to http://dstack/GetQuote over
      # /var/run/dstack.sock (mounted below) and dstack binds it verbatim into report_data[0:32].
      GATEWAY_DSTACK_QUOTE_URL: ${GATEWAY_DSTACK_QUOTE_URL:-http://dstack/GetQuote}
    ports:
      - "8088:8088"   # all-interfaces INSIDE the CVM; dstack-gateway is the external TLS
                      # boundary (cert carries the TDX quote). The CVM has no direct NIC.
    volumes:
      - gwdata:/data
      - /var/run/dstack.sock:/var/run/dstack.sock   # in-CVM guest-agent quote/Info socket (RA)
    logging:
      driver: "none"   # no logging of request paths/metadata (plaintext-exposure map row 5)

volumes:
  pgdata:
  ollama:
  gwdata:
